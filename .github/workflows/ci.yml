name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black (gate)
        if: matrix.python-version == '3.11'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" -- '*.py')"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
            if [ "$base_sha" = "0000000000000000000000000000000000000000" ]; then
              base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null || true)"
            fi
            if [ -n "$base_sha" ]; then
              changed_files="$(git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" -- '*.py')"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only --diff-filter=ACMR -r "$head_sha" -- '*.py')"
            fi
          fi

          if [ -z "$changed_files" ]; then
            echo "No changed Python files to format-check."
            exit 0
          fi

          printf '%s\n' "$changed_files"
          mapfile -t python_files <<<"$changed_files"
          printf '%s\0' "${python_files[@]}" | xargs -0 black --check

      - name: Ruff (gate)
        if: matrix.python-version == '3.11'
        run: ruff check .

      - name: Mypy (gate)
        if: matrix.python-version == '3.11'
        run: mypy confflow

      - name: Pytest
        run: pytest -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Coverage (gate)
        run: pytest tests/ --cov=confflow --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
