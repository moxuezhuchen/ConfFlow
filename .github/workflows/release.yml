name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build cyclonedx-bom

      - name: Build wheel and source distribution
        run: python -m build

      - name: Generate checksums
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          dist = Path("dist")
          lines = []
          for path in sorted(dist.glob("*")):
              if path.is_file():
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  lines.append(f"{digest}  {path.name}")
          (dist / "SHA256SUMS").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Generate CycloneDX SBOM
        continue-on-error: true
        run: |
          python -m pip install -e .
          cyclonedx-py environment --output-format JSON --output-file dist/sbom.cdx.json

      - name: Write release notes placeholder
        run: |
          {
            echo "Release artifact bundle for ${GITHUB_REF_NAME:-manual-run}"
            echo
            echo "Contents:"
            echo "- wheel and source distribution"
            echo "- SHA256SUMS"
            echo "- sbom.cdx.json when SBOM generation succeeds"
            echo
            echo "PyPI publishing and artifact attestation are not automated in this workflow."
          } > dist/RELEASE_ARTIFACTS.md

      - name: Upload release artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: confflow-release-artifacts
          path: dist/
