name: Scorecard

on:
  workflow_dispatch:
  schedule:
    - cron: "24 3 * * 1"

permissions:
  actions: read
  checks: read
  contents: read
  issues: read
  pull-requests: read
  security-events: write
  id-token: write

jobs:
  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Validate SARIF
        id: sarif
        if: always()
        shell: bash
        run: |
          sarif_file="scorecard-results.sarif"

          if [ ! -s "$sarif_file" ]; then
            echo "upload=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Scorecard SARIF file was not generated or is empty: $sarif_file"
            exit 0
          fi

          if ! python -m json.tool "$sarif_file" > /dev/null; then
            echo "upload=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Scorecard output is not valid JSON; skipping SARIF upload."
            sed -n '1,20p' "$sarif_file"
            exit 0
          fi

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          sarif_file = Path("scorecard-results.sarif")
          data = json.loads(sarif_file.read_text(encoding="utf-8"))
          is_sarif = data.get("version") == "2.1.0" and isinstance(data.get("runs"), list)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"upload={str(is_sarif).lower()}", file=output)

          if not is_sarif:
              print(
                  "::warning::Scorecard output is JSON but not SARIF 2.1.0; "
                  "skipping SARIF upload."
              )
          PY

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.sarif.outputs.upload == 'true'
        with:
          sarif_file: scorecard-results.sarif
